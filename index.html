<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>もちぽよバトラーズ</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <section id="screen-title" class="screen">
    <div class="title-emoji-row">
      <span>🍰</span><span>🍜</span><span>🍗</span>
    </div>
    <h1 class="title-logo">もちぽよバトラーズ</h1>
    <p>ぷにぷにもちぽよと なかまになろう！</p>
    <div class="title-buttons">
      <button id="btn-new-game" class="btn btn-block">はじめから</button>
      <button id="btn-continue" class="btn btn-secondary btn-block">つづきから</button>
      <button id="btn-delete-save" class="btn btn-danger btn-block">セーブデータを けす</button>
    </div>
  </section>

  <section id="screen-starter" class="screen"></section>

  <section id="screen-home" class="screen"></section>

  <section id="screen-explore" class="screen"></section>

  <section id="screen-battle" class="screen"></section>

  <section id="screen-dex" class="screen"></section>

  <section id="screen-raise" class="screen"></section>

  <section id="screen-shop" class="screen"></section>

  <section id="screen-settings" class="screen"></section>

  <section id="screen-party" class="screen"></section>

  <div id="toast" class="toast"></div>
  <div id="evolution-overlay" class="evolution-overlay hidden"></div>
  <div id="share-overlay" class="share-overlay hidden"></div>

</div>

<script src="js/vendor/qrcode-generator.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
